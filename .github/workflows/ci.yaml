name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: lint
        run: ruff check src/ tests/

      - name: format check
        run: ruff format --check src/ tests/

      - name: type check
        run: mypy src/

      - name: run tests
        run: pytest --cov=snyk_jira_reporter tests/
